<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 40px; text-align: center; }
        .form-card { background: white; padding: 25px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: left; width: 350px; border-top: 5px solid #2ecc71; }
        h2 { color: #2c3e50; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #34495e; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background-color: #2ecc71; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 48%; }
        .btn-cancel { background-color: #95a5a6; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 48%; float: right; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Create Student Account</h2>
        <form action="UserServlet" method="post">
            <label>Matric No:</label>
            <input type="text" name="matricNo"  required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <label>Full Name:</label>
            <input type="text" name="fullname" required>


            <input type="submit" value="Register" class="btn-submit">
            <a href="login.jsp" class="btn-cancel">Cancel</a>
        </form>
    </div>
</body>
</html>
