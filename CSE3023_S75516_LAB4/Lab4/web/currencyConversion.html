<html>
    <head>
        <title>Currency Conversion</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
        <style>
            /* Basic Settings */
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f4f7f6;
                margin: 0;
                padding: 20px;
                display: block;
            }
        
            .container {
                width: 100%;
                max-width: 900px;
                margin: 0 auto; /* center properly */
            }
        
            /* Main Title */
            h1 {
                font-size: 1.5rem;
                color: #333;
                margin-bottom: 20px;
                border-left: 5px solid #6f42c1;
                padding-left: 10px;
            }
        
            /* Form Card */
            .card {
                background: #ffffff;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }
        
            /* Form Title (Purple Heading) */
            .form-title {
                color: #6f42c1;
                font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-size: 1.8rem;
                font-weight: 600;
                letter-spacing: -0.5px;
                margin-top: 0;
                margin-bottom: 25px;
                text-transform: capitalize;
            }
        
            /* Input & Form Group Styling */
            .form-group {
                margin-bottom: 20px;
            }
            
            label {
                display: block;
                font-weight: bold;
                margin-bottom: 8px;
                color: #555;
            }
        
            input[type="text"],
            input[type="number"] {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
                box-sizing: border-box;
            }
        
            /* Radio Button Styling */
            .radio-group {
                display: flex;
                gap: 20px;
                align-items: center;
            }
        
            .radio-label {
                font-weight: normal;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 5px;
            }
        
            /* Button Styling */
            .button-group {
                margin-top: 30px;
                display: flex;
                gap: 10px;
            }
        
            .btn {
                padding: 10px 25px;
                border: none;
                border-radius: 4px; /* Fixed missing semicolon here */
                cursor: pointer;
                font-weight: bold;
                transition: 0.3s;
            }
        
            .btn-submit {
                background-color: #e0e0e0;
                color: #333;
                border: 1px solid #adadad;
            }
        
            .btn-submit:hover {
                background-color: #d0d0d0;
            }
        
            .btn-cancel {
                background-color: #e0e0e0;
                color: #333;
                border: 1px solid #adadad;
            }
        
            .btn-cancel:hover {
                background-color: #ffcccc;
            }
        
            /* Dropdown Select Styling */
            select {
                width: 100%;
                padding: 12px;
                border: 1px solid #ced4da;
                border-radius: 6px;
                background-color: white;
                font-size: 1rem;
                cursor: pointer;
            }
        
            select:focus {
                outline: none;
                border-color: #6f42c1;
            }

        
            /* ===== RESULT PAGE STYLES (TWO-COLUMN LAYOUT) ===== */
            .result-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-bottom: 25px;
            }
        
            .result-box {
                background: #f9f9fb;
                padding: 20px;
                border-radius: 8px;
                border: 1px solid #e0e0e0;
            }
        
            .result-box h3 {
                margin-top: 0;
                margin-bottom: 20px;
                color: #6f42c1;
                font-size: 1.3rem;
                border-bottom: 2px solid #6f42c1;
                padding-bottom: 10px;
            }
        
            /* Result text styling */
            .result-group {
                margin-bottom: 15px;
                padding: 8px 0;
                border-bottom: 1px dashed #e0e0e0;
            }
        
            .result-group:last-child {
                border-bottom: none;
            }
        
            .result-group label {
                display: inline-block;
                font-weight: 600;
                color: #555;
                min-width: 140px;
            }
        
            .result-group p {
                display: inline-block;
                margin: 0;
                color: #333;
                font-weight: 500;
            }
        
            /* Alternative Flexbox layout for result groups */
            .result-group-flex {
                display: flex;
                justify-content: space-between;
                margin-bottom: 12px;
                padding: 8px 0;
                border-bottom: 1px dashed #e0e0e0;
            }
        
            .result-group-flex label {
                font-weight: 600;
                color: #555;
            }
        
            .result-group-flex p {
                margin: 0;
                color: #333;
                font-weight: 500;
            }
        
            /* Back Button Styling (Result Page) */
            .btn-back {
                background-color: #6f42c1;
                color: white;
                border: none;
                padding: 10px 25px;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
                transition: 0.3s;
            }
        
            .btn-back:hover {
                background-color: #5a32a3;
            }
        
            /* Responsive Design for Mobile */
            @media (max-width: 768px) {
                .result-grid {
                    grid-template-columns: 1fr;
                    gap: 15px;
                }
                
                .result-group label {
                    display: block;
                    margin-bottom: 5px;
                }
            
                .result-group p {
                    display: block;
                    margin-left: 0;
                }
            
                .result-group-flex {
                    flex-direction: column;
                }
            }
        </style>
        
    </head>
    <body>
        
        <div class="container">
        <h1>Use JSP Declaration Tag, JSP Scriplet and JSP Expression in Application</h1>
        
        <div class="card">
            <h2 class="form-title">Currency Conversion</h2>
            
            <form action="processCurrency.jsp" method="POST">
                
                <div class="form-group">
                    <label for="amount">Amount (in RM)</label>
                    <input type="number" id="amount" name="amount" placeholder="[in RM]" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="currency">Convert to</label>
                    <select name="currencyType">
                        <option value="1">USD</option>
                        <option value="2">EURO</option>
                        <option value="3">JPY</option>
                        <option value="4">SGD</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-submit">Submit</button>
                    <button type="reset" class="btn btn-cancel">Cancel</button>
                </div>

            </form>
        </div>
    </div>
        
    </body>
</html>
